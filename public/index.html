<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pong Multiplayer</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  

  <div id="main-menu">
    <h1 class="game-title">PONG</h1>
    <button id="play-button" class="pixel-button">PLAY</button>
  </div>

  <p id="status">Connecting...</p>

  <div id="game-container" style="display:none;">
    <p id="player-label" class="pixel-heading"></p>
    <div class="score">
      <span id="player-score">0</span> - <span id="computer-score">0</span>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
  </div>

  <div id="win-screen" style="display:none;">
    <h2 id="win-message" class="pixel-heading"></h2>
    <div class="win-buttons">
    <button id="rematch-button" class="pixel-button">REMATCH</button>
    <button id="menu-button" class="pixel-button">MAIN MENU</button>
    </div>
</div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
