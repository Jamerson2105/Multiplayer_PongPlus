<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pong Multiplayer</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  



  <div id="main-menu">
  <h1 class="game-title">PONG</h1>
  <button id="play-button" class="pixel-button">PLAY RANDOM</button>
  <button id="play-friend-button" class="pixel-button">PLAY VS FRIEND</button>
</div>

<div id="private-menu" style="display:none;">
  <h2 class="pixel-heading">PLAY VS FRIEND</h2>

  <div id="private-choice">
    <button id="create-room-button" class="pixel-button">CREATE ROOM</button>
    <button id="join-room-button" class="pixel-button">JOIN ROOM</button>
  </div>

  <div id="create-room-panel" style="display:none;">
    <p id="room-code-display" class="pixel-heading"></p>
    <p id="private-status" class="pixel-small"></p>
  </div>

  <div id="join-room-panel" style="display:none;">
    <input id="room-code-input" class="pixel-input" maxlength="5" placeholder="CODE">
    <button id="submit-code-button" class="pixel-button">JOIN</button>
    <p id="private-error" class="pixel-small" style="color:#f55;"></p>
  </div>

  <button id="private-back-button" class="pixel-button">BACK</button>
</div>

  <p id="status">Connecting...</p>

  <div id="game-container" style="display:none;">
    <p id="player-label" class="pixel-heading"></p>
    <div class="score">
      <span id="player-score">0</span> - <span id="computer-score">0</span>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
  </div>

  <div id="win-screen" style="display:none;">
    <h2 id="win-message" class="pixel-heading"></h2>
    <div class="win-buttons">
    <button id="rematch-button" class="pixel-button">REMATCH</button>
    <button id="menu-button" class="pixel-button">MAIN MENU</button>
    </div>
</div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
